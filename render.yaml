services:
  - type: web
    name: ClamKaBot
    runtime: python
    rootDir: backend
    pythonVersion: "3.10.13"
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: LLM_MODEL
        value: "mistral-small-2503"
      - key: LLM_ENDPOINT
        value: "https://models.inference.ai.azure.com"
      - key: MAX_ROWS
        value: "1000"
      - key: QUERY_TIMEOUT
        value: "5"
      - key: CORS_ORIGINS
        value: "https://clam-ka-bot.vercel.app,http://localhost:5173"
